# build the vite spa and publish the compiled dist/ to the gh-pages branch on
# every push to main. pages then serves from that branch (deploy from a branch
# -> gh-pages -> /root). uses only contents:write, so no pages-api permission
# headaches.
name: deploy to pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: publish dist to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp dist/index.html dist/404.html   # spa fallback for deep links
          touch dist/.nojekyll               # don't let jekyll eat the assets
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name="Leviathan-sps" \
              -c user.email="296449302+Leviathan-sps@users.noreply.github.com" \
              commit -qm "deploy ${GITHUB_SHA}"
          git push -fq "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
